name: Docker Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Sub-Store Version
        id: sub_store_version
        if: github.event_name != 'pull_request' && github.ref_type == 'branch' && (github.ref_name == 'main' || github.ref_name == 'master')
        run: |
          version="$(node -p 'require("./third_party/Sub-Store/backend/package.json").version')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && github.ref_type == 'branch' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        if: github.event_name != 'pull_request' && github.ref_type == 'branch' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=http-meta
            type=raw,value=${{ steps.sub_store_version.outputs.version }}-http-meta
          labels: |
            org.opencontainers.image.version=${{ steps.sub_store_version.outputs.version }}

      - name: Build Test Image
        if: github.event_name == 'pull_request' || (github.ref_type == 'branch' && github.ref_name != 'main' && github.ref_name != 'master')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: sub-store-source:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push GHCR Image
        if: github.event_name != 'pull_request' && github.ref_type == 'branch' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect Built Image
        if: github.event_name == 'pull_request' || (github.ref_type == 'branch' && github.ref_name != 'main' && github.ref_name != 'master')
        run: docker image inspect sub-store-source:test
